$mainMod = SUPER

# Terminal
bind = $mainMod, Q, exec, kitty

# Launcher
bind = $mainMod, R, exec, rofi -show drun -modi drun

# File manager
bind = $mainMod, E, exec, dolphin

# Close window
bind = $mainMod, C, killactive

# Exit Hyprland
bind = $mainMod SHIFT, E, exit

# Toggle floating
bind = $mainMod, V, togglefloating

# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move windows to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Reload Hyprland
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows
bind = $mainMod CTRL, left, resizeactive, -60 0
bind = $mainMod CTRL, right, resizeactive, 60 0
bind = $mainMod CTRL, up, resizeactive, 0 -60
bind = $mainMod CTRL, down, resizeactive, 0 60

# Toggle pseudotile
bind = $mainMod, P, pseudo

# Toggle split direction
bind = $mainMod, J, togglesplit




# =========================
# HARDWARE MEDIA KEYS
# =========================

# Volume
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl = , XF86AudioMute, exec, pamixer -t

# Microphone mute
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ASUS ROG key
bind = , XF86Launch3, exec, rog-control-center


# =========================
# ASUS FUNCTION KEYS
# =========================

# Fn + F1 -> Audio mute toggle
bindl = , XF86AudioMute, exec, pamixer -t

# Fn + F2 -> Keyboard brightness down
bindl = , XF86KbdBrightnessDown, exec, brightnessctl --device='*kbd_backlight*' set 1-

# Fn + F3 -> Keyboard brightness up
bindl = , XF86KbdBrightnessUp, exec, brightnessctl --device='*kbd_backlight*' set +1



# Fn + F4 -> Aura / keyboard lighting mode
bindl = , XF86Launch4, exec, asusctl aura effect --next-mode && notify-send "ASUS Aura" "Mode toggled"

# Fn + F5 -> ASUS performance profile
bindl = , XF86Launch5, exec, asusctl profile -n



# =========================
# SCREENSHOTS
# =========================

# Ensure directory exists
exec-once = mkdir -p ~/Pictures/Screenshots

# Region screenshot (save + copy)
bind = , Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy && notify-send "Screenshot" "Region screenshot copied & saved"

# Fullscreen screenshot (save + copy)
bind = SUPER, Print, exec, grim - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy && notify-send "Screenshot" "Fullscreen screenshot copied & saved"

# =========================
# QuickShell PowerMenu Toggle
# =========================
bind = SUPER, ESCAPE, exec, /usr/bin/quickshell -n ipc call powermenu togglePowermenu