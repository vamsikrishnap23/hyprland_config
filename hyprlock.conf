# Source dynamic Matugen colors
source = ~/.config/hypr/mac_colors.conf

# ==========================================
# BACKGROUND
# ==========================================
background {
    monitor =
    path = ~/.config/hypr/current_wallpaper.jpg
    
    # 1. Increase passes to enable blur (0 disables it)
    blur_passes = 3 
    
    # 2. Adjust the radius of the blur 
    blur_size = 8   
    
    # Keep the dark overlay for text readability
    color = rgba(0, 0, 0, 0.4) 
}

# ==========================================
# DATE (Top Center)
# ==========================================
label {
    monitor =
    text = cmd[update:18000000] echo "<b>$(date +"%A, %B %d")</b>"
    color = rgba(255, 255, 255, 0.8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = top
}

# ==========================================
# TIME (Top Center)
# ==========================================
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 95
    
    # Changed from JetBrainsMono to a modern sans-serif. 
    # Use "SF Pro Display", "Inter", or "Helvetica" if you have them installed!
    font_family = sans-serif 
    
    position = 0, -130
    halign = center
    valign = top
}


# ==========================================
# PROFILE PICTURE (Bottom Center)
# ==========================================
image {
    monitor =
    path = /home/vamsi/global_image/avatar.jpeg
    size = 80
    rounding = -1
    border_size = 0
    position = 0, 140
    halign = center
    valign = bottom
}

# ==========================================
# USERNAME
# ==========================================
label {
    monitor =
    text = Vamsi
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = bottom
}

# ==========================================
# PASSWORD FIELD (Minimal Pill)
# ==========================================
input-field {
    monitor =
    size = 180, 30
    outline_thickness = 0
    
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.15)
    font_color = rgba(255, 255, 255, 1)
    
    fade_on_empty = false
    placeholder_text = <span font_family="JetBrainsMono Nerd Font" foreground="##ffffff88">Enter Password</span>
    hide_input = false
    
    # Matugen dynamic colors for authentication feedback
    check_color = $primary
    fail_color = rgb(f38ba8)
    
    position = 0, 50
    halign = center
    valign = bottom
    rounding = 15
}